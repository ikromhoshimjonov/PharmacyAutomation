{% load static %}

{% block extra_head %}
<style>
:root {
  --pharm-green: #10b981;
  --pharm-dark: #064e3b;
  --pharm-light: #f0fdf4;
  --white: #ffffff;
  --muted: #6b7280;
  --danger: #ef4444;
}

* { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

html, body {
  height: 100%;
  margin: 0;
  background-color: var(--pharm-light);
}

.auth-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: radial-gradient(circle at top left, rgba(16, 185, 129, 0.1), transparent 40%), #ffffff;
}

.auth-card {
  width: 100%;
  max-width: 450px;
  padding: 40px;
  border-radius: 28px;
  background: var(--white);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
  border: 1px solid rgba(16, 185, 129, 0.1);
  position: relative;
}

.auth-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: var(--pharm-green);
  border-radius: 28px 28px 0 0;
}

.brand-section { text-align: center; margin-bottom: 30px; }

.auth-title { font-size: 24px; font-weight: 800; color: var(--pharm-dark); margin: 0; }

.form-group { margin-bottom: 22px; }

.form-label {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 8px;
  display: block;
  color: var(--pharm-dark);
}

.form-control {
  width: 100%;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1.5px solid #e2e8f0;
  background: #f8fafc;
  color: var(--pharm-dark);
  font-size: 15px;
  transition: all 0.3s ease;
}

.form-control:focus {
  outline: none;
  border-color: var(--pharm-green);
  background: white;
}

.btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  font-weight: 800;
  font-size: 16px;
  cursor: pointer;
  background: var(--pharm-green);
  color: white;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
}

.btn:disabled {
  background: #9ca3af;
  cursor: not-allowed;
}

.alert {
  display: none;
  margin-bottom: 1.5rem;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  text-align: center;
  font-weight: 600;
  border: 1px solid #fee2e2;
  background: #fef2f2;
  color: var(--danger);
}
</style>
{% endblock %}

{% block content %}
<section class="auth-wrap">
  <div class="auth-card">

    <div class="brand-section">
      <span style="font-size: 45px;">⚕️</span>
      <h3 class="auth-title">Xush kelibsiz!</h3>
      <p style="color: var(--muted); font-size: 14px; margin-top: 5px;">Tizimga kirish uchun ma'lumotlarni kiriting</p>
    </div>

    <div id="msg" class="alert"></div>

    <form id="login-form">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label">Email Manzil</label>
        <input class="form-control" id="email" type="email" placeholder="shifokor@mail.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Maxfiy Parol</label>
        <input class="form-control" id="password" type="password" placeholder="••••••••" required>
      </div>

      <button class="btn" type="submit" id="submit-btn">TIZIMGA KIRISH</button>

      <div style="display: flex; justify-content: space-between; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9;">
          <span style="color: var(--muted); font-size: 14px;">Profilingiz yo'qmi?</span>
          <a href="/register/front" style="color: var(--pharm-green); text-decoration: none; font-weight: 700; font-size: 14px;">Ro‘yxatdan o‘tish</a>
      </div>

    </form>
  </div>
</section>

<script>
const form = document.getElementById("login-form");
const msgBox = document.getElementById("msg");
const submitBtn = document.getElementById("submit-btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  // Tozalash va yuklash holati
  msgBox.style.display = "none";
  submitBtn.disabled = true;
  submitBtn.innerText = "KIRILMOQDA...";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

  try {
    // FAQAT BIR MARTA SO'ROV: Bu so'rov ham JWT beradi, ham Session ochadi
    const res = await fetch("/api/token/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
        throw new Error(data.detail || "Email yoki parol noto‘g‘ri!");
    }

    // JWT saqlash (kelgusidagi API so'rovlari uchun)
    localStorage.setItem("access", data.access);
    localStorage.setItem("refresh", data.refresh);

    // Muvaffaqiyatli login - Bosh sahifaga yo'naltirish
    window.location.href = "/";

  } catch (err) {
    msgBox.innerText = err.message;
    msgBox.style.display = "block";
    submitBtn.disabled = false;
    submitBtn.innerText = "TIZIMGA KIRISH";
  }
});
</script>
{% endblock %}
