{% extends "frontend/base.html" %}
{% block content %}

{% if user.is_authenticated %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --brand: #4318ff;
        --bg-soft: #f4f7fe;
        --navy: #1b2559;
        --text-gray: #a3aed0;
        --border: #e0e5f2;
    }

    body {
        background-color: var(--bg-soft);
        font-family: 'Plus Jakarta Sans', sans-serif;
        overflow-x: hidden;
    }

    .stock-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }

    .filter-card {
        background: #fff; padding: 15px 25px; border-radius: 18px;
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 25px; border: 1px solid var(--border);
        box-shadow: 0px 15px 35px rgba(112, 144, 176, 0.05);
    }

    .stock-card {
        background: #fff; border-radius: 20px; border: 1px solid var(--border);
        box-shadow: 0px 10px 30px rgba(0,0,0,0.02);
        width: 100%; overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }

    th {
        background: #fcfcfd; padding: 16px; text-align: left;
        font-size: 11px; font-weight: 800; color: var(--text-gray);
        text-transform: uppercase; border-bottom: 1px solid var(--border);
    }

    td {
        padding: 16px; border-bottom: 1px solid #f8f9fa;
        font-size: 14px; font-weight: 600; color: var(--navy);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .w-med { width: 25%; } .w-cat { width: 12%; } .w-type { width: 10%; }
    .w-qty { width: 10%; } .w-price { width: 15%; } .w-total { width: 15%; }
    .w-date { width: 13%; }

    .type-badge {
        padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800;
        display: inline-flex; align-items: center; gap: 5px;
    }
    .badge-in { background: #e6f9f4; color: #05cd99; }
    .badge-out { background: #fff1f0; color: #ee5d50; }

    .date-text { color: var(--text-gray); font-weight: 700; font-size: 13px; }
</style>

<div class="stock-container">
    <div style="margin-bottom: 25px;">
        <h1 style="color: var(--navy); font-weight: 800; font-size: 32px; margin: 0;">📦 Zaxira Hisoboti</h1>
        <p style="color: var(--text-gray); margin: 5px 0 0;">Kunlik kirim va chiqim operatsiyalari</p>
    </div>

    <div class="filter-card">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span style="font-weight: 700; color: var(--navy);">Sana:</span>
            <input type="date" id="dateFilter" style="padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); outline: none; font-weight: 600;">
        </div>
        <button class="btn-reset" onclick="resetFilter()" style="background: var(--brand); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700;">Hammasini ko'rsat</button>
    </div>

    <div id="stockWrapper">
        <div style="text-align: center; padding: 50px; color: var(--text-gray);">
            <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
        </div>
    </div>
</div>

<script>
    "use strict";

    let allStockData = [];
    const uzCurrency = new Intl.NumberFormat('uz-UZ', { style: 'currency', currency: 'UZS', minimumFractionDigits: 0 });

    async function fetchStock() {
        try {
            const response = await fetch('/api/v1/stock/');

            // Tizimga kirmagan bo'lsa yo'naltirish
            if (response.status === 401 || response.status === 403) {
                window.location.href = "/login/";
                return;
            }

            allStockData = await response.json();
            renderStock(allStockData);
        } catch (e) {
            console.error("API xatosi:", e);
        }
    }

    function renderStock(data) {
        const wrapper = document.getElementById('stockWrapper');
        wrapper.innerHTML = "";

        if (data.length === 0) {
            wrapper.innerHTML = '<div style="text-align:center; padding:50px; color:#a3aed0;">Ma\'lumot topilmadi</div>';
            return;
        }

        const grouped = data.reduce((acc, item) => {
            const d = item.date ? item.date.split('T')[0] : "Noma'lum";
            if (!acc[d]) acc[d] = [];
            acc[d].push(item);
            return acc;
        }, {});

        Object.keys(grouped).sort().reverse().forEach(dateLabel => {
            const items = grouped[dateLabel];
            let html = `
                <div style="margin-bottom: 35px;">
                    <div style="font-weight: 800; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
                        <i class="fa-solid fa-calendar-day" style="color: var(--brand);"></i> ${dateLabel}
                        <span style="font-size: 11px; background: #e0e5f2; color: var(--brand); padding: 3px 10px; border-radius: 6px;">${items.length} TA OPERATSIYA</span>
                    </div>
                    <div class="stock-card">
                        <table>
                            <thead>
                                <tr>
                                    <th class="w-med">Mahsulot</th>
                                    <th class="w-cat">Kategoriya</th>
                                    <th class="w-type">Turi</th>
                                    <th class="w-qty">Miqdor</th>
                                    <th class="w-price">Narxi</th>
                                    <th class="w-total">Jami Summa</th>
                                    <th class="w-date">Vaqti (Kun)</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            items.forEach(item => {
                const price = parseFloat(item.medicine_price) || 0;
                const qty = parseInt(item.quantity) || 0;
                const onlyDate = item.date ? item.date.split('T')[0] : '---';

                html += `
                    <tr>
                        <td style="font-weight: 800;">${item.medicine_name || '---'}</td>
                        <td><span style="background: #f4f7fe; padding: 4px 8px; border-radius: 6px; font-size: 11px; color: var(--brand);">${item.medicine_category || 'adults'}</span></td>
                        <td>
                            <span class="type-badge ${item.type === 'in' ? 'badge-in' : 'badge-out'}">
                                <i class="fa-solid ${item.type === 'in' ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                                ${item.type === 'in' ? 'KIRIM' : 'CHIQIM'}
                            </span>
                        </td>
                        <td>${qty} dona</td>
                        <td style="color: var(--text-gray);">${uzCurrency.format(price)}</td>
                        <td style="font-weight: 800;">${uzCurrency.format(price * qty)}</td>
                        <td class="date-text"><i class="fa-regular fa-calendar"></i> ${onlyDate}</td>
                    </tr>
                `;
            });

            html += `</tbody></table></div></div>`;
            wrapper.insertAdjacentHTML('beforeend', html);
        });
    }

    $('#dateFilter').on('change', function() {
        const val = $(this).val();
        if(!val) renderStock(allStockData);
        else renderStock(allStockData.filter(i => i.date.startsWith(val)));
    });

    function resetFilter() { $('#dateFilter').val(''); renderStock(allStockData); }

    $(document).ready(() => fetchStock());
</script>

{% else %}
<script>window.location.href = "/login/";</script>
<div style="text-align: center; padding: 50px;">
    <h2>Iltimos, avval tizimga kiring!</h2>
</div>
{% endif %}

{% endblock %}
